<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花火師パズル - LCP ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Helvetica Neue', Arial, sans-serif; touch-action: none; }
        canvas { display: block; }
        .ui { position: absolute; top: 25px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 100; }
        #score { font-size: 3.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.6); letter-spacing: -2px; }
        .hint { font-size: 0.9rem; opacity: 0.7; margin-top: 8px; letter-spacing: 1px; line-height: 1.5; }
        .kbd-guide { font-weight: bold; color: #FFD700; }
        .back-link { position: fixed; bottom: 20px; left: 20px; color: #0f0; text-decoration: none; font-family: monospace; font-size: 0.7rem; border: 1px solid #0f0; padding: 5px 10px; background: rgba(0,0,0,0.8); pointer-events: auto; z-index: 1000; }
        .back-link:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div class="ui">
        <div id="score">0</div>
        <div class="hint">
            <span class="kbd-guide">← →</span> : MOVE / <span class="kbd-guide">↑ or SPACE</span> : ROTATE / <span class="kbd-guide">↓</span> : DROP<br>
            <span style="font-size: 0.7rem; opacity: 0.5;">(Mouse/Touch also supported)</span>
        </div>
    </div>
    <a href="index.html" class="back-link">< RETURN TO TERMINAL</a>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const COLS = 6;
        const ROWS = 13;
        const COLORS = ['#FF3D3D', '#3D82FF', '#FFD700'];
        const GLOW_STRENGTH = 25;
        
        let grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
        let score = 0;
        let cellSize;
        
        let activePair = null; 
        let isProcessing = false;
        let effects = [];

        function init() {
            resize();
            spawn();
            setupKeyboard();
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cellSize = Math.min(canvas.width / (COLS + 4), (canvas.height * 0.75) / ROWS);
        }

        window.addEventListener('resize', resize);

        function spawn() {
            const x = Math.floor(COLS / 2);
            activePair = {
                x: x,
                y: 0,
                c1: Math.floor(Math.random() * 3),
                c2: Math.floor(Math.random() * 3)
            };
            
            if (grid[0][x] !== null || grid[1][x] !== null) {
                grid = Array.from({length: ROWS}, () => Array(COLS).fill(null));
                score = 0;
                scoreEl.innerText = score;
            }
        }

        function setupKeyboard() {
            window.addEventListener('keydown', e => {
                if (isProcessing || !activePair) return;
                switch(e.key) {
                    case 'ArrowLeft': moveActivePair(-1); break;
                    case 'ArrowRight': moveActivePair(1); break;
                    case 'ArrowUp':
                    case ' ': rotateActivePair(); e.preventDefault(); break;
                    case 'ArrowDown': tickInterval = 30; break;
                }
            });
            window.addEventListener('keyup', e => { if (e.key === 'ArrowDown') tickInterval = 700; });
        }

        function moveActivePair(dir) {
            if (activePair.x + dir >= 0 && activePair.x + dir < COLS) {
                if (grid[activePair.y][activePair.x + dir] === null && grid[activePair.y + 1][activePair.x + dir] === null) {
                    activePair.x += dir;
                }
            }
        }

        function rotateActivePair() {
            const tmp = activePair.c1;
            activePair.c1 = activePair.c2;
            activePair.c2 = tmp;
        }

        let startX, startY, moved;
        window.addEventListener('touchstart', e => {
            if (isProcessing) return;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            moved = false;
        });

        window.addEventListener('touchmove', e => {
            if (isProcessing || !activePair) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            if (Math.abs(dx) > cellSize * 0.5) {
                moveActivePair(dx > 0 ? 1 : -1);
                startX = e.touches[0].clientX;
                moved = true;
            }
            if (dy > cellSize * 1.2) {
                tickInterval = 30;
                moved = true;
            }
        });

        window.addEventListener('touchend', () => {
            if (!moved && !isProcessing && activePair) rotateActivePair();
            tickInterval = 700;
        });

        let lastTick = 0;
        let tickInterval = 700;

        function gameLoop(time) {
            if (time - lastTick > tickInterval) {
                if (!isProcessing) moveLogic();
                lastTick = time;
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        function moveLogic() {
            if (!activePair) return;
            if (activePair.y + 2 < ROWS && grid[activePair.y + 2][activePair.x] === null) {
                activePair.y++;
            } else {
                grid[activePair.y][activePair.x] = activePair.c1;
                grid[activePair.y + 1][activePair.x] = activePair.c2;
                activePair = null;
                checkMatches();
            }
        }

        async function checkMatches() {
            isProcessing = true;
            let found = true;
            while (found) {
                let toRemove = new Set();
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS - 2; c++) {
                        if (grid[r][c] !== null && grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r][c+2]) {
                            [0,1,2].forEach(i => toRemove.add(`${r},${c+i}`));
                        }
                    }
                }
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r < ROWS - 2; r++) {
                        if (grid[r][c] !== null && grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r+2][c]) {
                            [0,1,2].forEach(i => toRemove.add(`${r+i},${c}`));
                        }
                    }
                }

                if (toRemove.size > 0) {
                    const list = Array.from(toRemove).map(s => s.split(',').map(Number));
                    const fx = (canvas.width - COLS * cellSize) / 2;
                    const fy = canvas.height - (ROWS + 1) * cellSize;
                    let neighbors = [];
                    list.forEach(([r, c]) => {
                        effects.push(new Firework(fx + (c + 0.5) * cellSize, fy + (r + 0.5) * cellSize, grid[r][c]));
                        [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr, nc]) => {
                            if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && grid[nr][nc] !== null && !toRemove.has(`${nr},${nc}`)) {
                                neighbors.push([nr, nc]);
                            }
                        });
                        grid[r][c] = null;
                        score += 100;
                    });
                    scoreEl.innerText = score;
                    await new Promise(res => setTimeout(res, 400));
                    neighbors.forEach(([nr, nc]) => { if (grid[nr][nc] !== null) grid[nr][nc] = (grid[nr][nc] + 1) % 3; });
                    applyGravity();
                    await new Promise(res => setTimeout(res, 300));
                } else { found = false; }
            }
            isProcessing = false;
            spawn();
        }

        function applyGravity() {
            for (let c = 0; c < COLS; c++) {
                for (let r = ROWS - 1; r > 0; r--) {
                    if (grid[r][c] === null && grid[r - 1][c] !== null) {
                        grid[r][c] = grid[r - 1][c]; grid[r - 1][c] = null; r = ROWS; 
                    }
                }
            }
        }

        class Firework {
            constructor(x, y, colorIdx) {
                this.x = x; this.y = y; this.ty = 80 + Math.random() * 180;
                this.c = COLORS[colorIdx]; this.state = 'up'; this.particles = [];
            }
            update() {
                if (this.state === 'up') {
                    this.y -= 16;
                    if (this.y <= this.ty) {
                        this.state = 'boom';
                        for (let i = 0; i < 60; i++) {
                            const a = Math.random() * Math.PI * 2;
                            const v = Math.random() * 10 + 2;
                            this.particles.push({x: this.x, y: this.y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, l: 1.0, r: 1.5 + Math.random()*2.5});
                        }
                    }
                } else {
                    this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.l -= 0.015; });
                    this.particles = this.particles.filter(p => p.l > 0);
                    if (this.particles.length === 0) this.dead = true;
                }
            }
            draw(t) {
                t.save();
                if (this.state === 'up') {
                    t.shadowBlur = 15; t.shadowColor = '#fff'; t.fillStyle = '#fff'; t.beginPath(); t.arc(this.x, this.y, 3, 0, Math.PI*2); t.fill();
                } else {
                    this.particles.forEach(p => {
                        t.shadowBlur = 20; t.shadowColor = this.c; t.globalAlpha = p.l; t.fillStyle = this.c; t.beginPath(); t.arc(p.x, p.y, p.r, 0, Math.PI*2); t.fill();
                    });
                }
                t.restore();
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 12, 0.22)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const fx = (canvas.width - COLS * cellSize) / 2;
            const fy = canvas.height - (ROWS + 1) * cellSize;
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            for(let i=0; i<30; i++) ctx.fillRect((i*223)%canvas.width, (i*149)%canvas.height, 1, 1);
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 2;
            ctx.strokeRect(fx, fy, COLS * cellSize, ROWS * cellSize);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] !== null) drawBall(fx + (c+0.5)*cellSize, fy + (r+0.5)*cellSize, grid[r][c], false);
                }
            }
            if (activePair) {
                drawBall(fx + (activePair.x+0.5)*cellSize, fy + (activePair.y+0.5)*cellSize, activePair.c1, true);
                drawBall(fx + (activePair.x+0.5)*cellSize, fy + (activePair.y+1.5)*cellSize, activePair.c2, true);
            }
            effects.forEach(e => { e.update(); e.draw(ctx); });
            effects = effects.filter(e => !e.dead);
        }

        function drawBall(cx, cy, colorIdx, isGlow) {
            const r = cellSize * 0.44;
            ctx.save();
            if (isGlow) { ctx.shadowBlur = GLOW_STRENGTH; ctx.shadowColor = COLORS[colorIdx]; }
            const grad = ctx.createRadialGradient(cx-r*0.2, cy-r*0.2, r*0.1, cx, cy, r);
            grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, COLORS[colorIdx]); grad.addColorStop(1, '#000');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
        init();
    </script>
</body>
</html>
