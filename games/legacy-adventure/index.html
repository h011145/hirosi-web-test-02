<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO WORLD ADVENTURE // MISSION_SYNCHRONIZED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { background-color: #000; color: #0f0; font-family: 'Fira Code', monospace; line-height: 1.8; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .scanline { width: 100%; height: 100px; z-index: 99; pointer-events: none; background: linear-gradient(0deg, rgba(0, 255, 0, 0) 0%, rgba(0, 255, 0, 0.05) 50%, rgba(0, 255, 0, 0) 100%); opacity: 0.1; position: fixed; bottom: 100%; animation: scanline 8s linear infinite; }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }
        .game-screen { flex-grow: 1; padding: 40px; overflow-y: auto; border: 1px solid #030; margin: 20px; background: rgba(0, 20, 0, 0.5); }
        .choice-btn { display: block; width: 100%; text-align: left; border: 1px solid #0f0; padding: 10px 20px; margin-bottom: 10px; background: rgba(0, 255, 0, 0.05); cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .choice-btn:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        .header { padding: 20px 40px; border-bottom: 1px solid #030; display: flex; justify-content: space-between; font-size: 0.8rem; color: #0a0; }
        .inject-area { background: #050505; border: 1px dashed #050; padding: 10px; margin-top: 20px; display: none; }
        #lcp-input { width: 100%; background: transparent; border: none; color: #f0f; font-size: 0.7rem; outline: none; height: 60px; font-family: inherit; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #0f0; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <header class="header">
        <span>NEO_WORLD_SAGA // ADVENTURE_HUB v4.1</span>
        <span id="scene-counter">SYSTEM_ONLINE</span>
    </header>

    <main class="game-screen" id="story-area">
        <div id="text-display" class="mb-10 text-lg md:text-xl whitespace-pre-wrap"></div>
        <div id="choice-buttons"></div>
        <div id="inject-container" class="inject-area">
            <div class="text-[9px] text-purple-700 mb-1">// PASTE LCP STORY DATA (cat << 'EOF' ...)</div>
            <textarea id="lcp-input" placeholder="AIから出力された物語コマンドをここに貼り付け、Ctrl+Enterで執行せよ..."></textarea>
        </div>
    </main>

    <footer class="p-5 text-center flex justify-center gap-10">
        <button onclick="showMenu()" class="text-[10px] text-green-800 hover:text-green-400 underline">SELECTION_MENU</button>
        <button onclick="toggleInjector()" class="text-[10px] text-purple-900 hover:text-purple-400 underline">LCP_INJECTOR</button>
    </footer>

    <script>
        let gameData = {
          "campaigns": {
            "galaxy": {
              "title": "銀河の彼方へ: 第1話 目覚めの惑星",
              "scenes": {
                "start": { "text": "【宇宙ステーション・オリオン】\n西暦3024年。人類は銀河系全体に居住区を広げていた。\n\n主人公カイは、記憶を失った状態で隔離区画で目を覚ます。\nカイ「ここは…？ 俺は誰だ…？」", "choices": [{ "text": "部屋を出て探索する", "nextScene": "scene_2" }] },
                "scene_2": { "text": "【ステーション・制御室】\nアンドロイドのリリが部屋に入ってくる。\n\nリリ「目が覚めたのですね、カイ。私はリリ、あなたのパートナーです。」\nカイ「パートナー？ 俺に何が起きたんだ？」", "choices": [{ "text": "リリに詳しく尋ねる", "nextScene": "scene_3" }] },
                "scene_3": { "text": "【宇宙空間】\n突然、ステーション全体に警報が鳴り響く。窓の外にはヴォイド帝国の巨大戦艦群が！\n\nリリ「来たわね… ヴォイド帝国。行きましょう、カイ！」", "choices": [{ "text": "格納庫へ向かう", "nextScene": "scene_4" }] },
                "scene_4": { "text": "【宇宙ステーション・格納庫】\nそこには、白銀の戦闘機『イノセンス』が停めてあった。\n機体に触れた瞬間、カイの脳裏に激しいフラッシュバックが走る！", "choices": [{ "text": "イノセンスに搭乗する", "nextScene": "scene_5" }] },
                "scene_5": { "text": "【戦闘機コックピット】\nカイ「そうだ… 俺は戦っていた。ヴォイドと…！」\n\n本能的に蘇る操縦技術。イノセンスが黄金色に輝き、圧倒的な力で敵を撃破していく！", "choices": [{ "text": "決戦を制する", "nextScene": "scene_6" }] },
                "scene_6": { "text": "【宇宙ステーション・展望室】\n戦いは終わった。カイとリリは星空を見上げる。\n\nカイ「俺の記憶が戻るまで… いや、それからもずっと、君と共に戦おう。」\n\n一方、銀河の闇深くでヴォイドの帝王が不気味に笑っていた。\n「計画通りに進め...」", "isEnding": true }
              }
            },
            "centuries": {
              "title": "百世紀編：邪神の畏怖",
              "scenes": {
                "start": { "text": "邪神カロンは、バレンタインの底知れぬ狂気に冷や汗を流していた。\n「あいつは昆虫人の女王にまで手を出すつもりか？」", "choices": [{ "text": "詳細を閲覧する", "nextScene": "ep1" }] },
                "ep1": { "text": "「あいつは、そのうちカマキリの雌にだってアタックしそうで、俺は怖いよ」\nかつての冗談が、今、現実になろうとしている。", "isEnding": true }
              }
            }
          }
        };

        let activeCampaign = null;

        function typeWriter(text, elementId, speed, callback) {
            let i = 0; const el = document.getElementById(elementId);
            el.innerHTML = "";
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, speed); }
                else if (callback) { callback(); }
            }
            type();
        }

        function showMenu() {
            const btnArea = document.getElementById('choice-buttons');
            document.getElementById('text-display').innerHTML = "CHOOSE MISSION ARCHIVE:";
            btnArea.innerHTML = "";
            Object.keys(gameData.campaigns).forEach(id => {
                const b = document.createElement('button');
                b.className = "choice-btn";
                b.innerText = "> " + gameData.campaigns[id].title;
                b.onclick = () => startCampaign(id);
                btnArea.appendChild(b);
            });
        }

        function startCampaign(id) {
            activeCampaign = gameData.campaigns[id];
            renderScene('start');
        }

        function renderScene(sceneId) {
            const scene = activeCampaign.scenes[sceneId];
            const btnArea = document.getElementById('choice-buttons');
            const counter = document.getElementById('scene-counter');
            btnArea.innerHTML = "";
            counter.innerText = `LOG: ${sceneId.toUpperCase()}`;

            typeWriter(scene.text, "text-display", 30, () => {
                const cursor = document.createElement('span'); cursor.className = 'cursor';
                document.getElementById('text-display').appendChild(cursor);
                if (scene.isEnding) {
                    const b = document.createElement('button');
                    b.className = "choice-btn text-yellow-500 border-yellow-500";
                    b.innerText = "> MISSION_COMPLETE";
                    b.onclick = showMenu;
                    btnArea.appendChild(b);
                } else {
                    scene.choices.forEach(c => {
                        const b = document.createElement('button');
                        b.className = "choice-btn";
                        b.innerText = "> " + c.text;
                        b.onclick = () => renderScene(c.nextScene);
                        btnArea.appendChild(b);
                    });
                }
            });
        }

        function toggleInjector() {
            const el = document.getElementById('inject-container');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        document.getElementById('lcp-input').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                const raw = this.value;
                try {
                    const jsonMatch = raw.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const newCampaign = JSON.parse(jsonMatch[0]);
                        const id = "injected_" + Date.now();
                        gameData.campaigns[id] = newCampaign;
                        alert("LCP INJECTION SUCCESSFUL: " + newCampaign.title);
                        this.value = "";
                        toggleInjector();
                        showMenu();
                    }
                } catch(err) { alert("INJECTION FAILED."); }
            }
        });

        window.onload = showMenu;
    </script>
</body>
</html>
