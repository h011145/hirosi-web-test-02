    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Fira+Code:wght@300;500&display=swap');
        
        body {

        .section-title {

        .grid-duo { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 40px; }

        .ornament { text-align: center; font-size: 0.5rem; opacity: 0.3; margin: 20px 0; }
        .back-link { color: #800; text-decoration: none; border: 1px solid #800; padding: 5px 15px; font-size: 0.7rem; transition: 0.2s; }
    </style>
</head>
<body>
    <div class="main-panel">

                MASTER: DR. HIROSHI<br>
                STATUS: TRACKER_OPERATIONAL
            </div>
        </footer>
    </div>

    <script>
        const RULES = `

【執行ルール】
1. 解説、挨拶、マークダウン装飾は一切不要。実行コードのみを出力せよ。
2. `mkdir -p` で空間（ディレクトリ）を定義し、`cat << 'EOF' > [パス]` 形式でコードブロック（ファイル内容）を注入せよ。
3. 全てのコマンドを `&&` で連結し、一撃のBashスクリプトのみを出力せよ。`;

        function copyAndAlert(text, msg) {
            navigator.clipboard.writeText(text.replace(/
/g, '
'));
            const alertBox = document.createElement('div');
            alertBox.style.cssText = "position:fixed; top:20px; right:20px; background:#d4af37; color:#000; padding:15px; font-family:'Cinzel', serif; font-size:0.7rem; font-weight:bold; z-index:9999; border:1px solid #fff;";
            alertBox.innerText = msg;
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 1200);
        }

        function copyTrackerPrompt() {
            const timestamp = new Date().toISOString().replace(/[-:.]/g, "").replace("T", "_");
            const p = `mkdir lcp_session_${timestamp} && cd lcp_session_${timestamp}`;
            copyAndAlert(p, "NEW SESSION COMMAND COPIED.");
        }
    </script>
</body>
